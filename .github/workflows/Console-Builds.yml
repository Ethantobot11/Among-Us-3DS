name: Local Unity 3DS Background Builder

on:
  push:
    branches: [ main ]

jobs:
  build-3ds-local:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Background Unity Build
        shell: cmd
        run: |
          echo "Starting headless background compilation..."
          "C:\Program Files\Unity\Editor\Unity.exe" -batchmode -quit -projectPath "." -buildTarget N3DS