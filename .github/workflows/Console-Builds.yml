name: Console Homebrew Builder

on:
  push:
    branches: [ main ]

jobs:
  build-3ds:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile and Package CIA
        run: |
          make
          bannertool makebanner -i assets/banner.png -a assets/audio.wav -o banner.bnr
          bannertool makesmdh -s "Among3DS" -l "Among Us 3DS Clone" -p "Developer" -i assets/icon.png -o icon.icn
          makerom -f cia -o Among3DS.cia -target t -elf build/game.elf -rsf config/app.rsf

      - name: Upload CIA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DS-CIA-Build
          path: Among3DS.cia

  build-wiiu:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Wii U Application
        run: |
          make
          wuhbtool build/game.rpx AmongUsWiiU.wuhb --name="Among Us Wii U" --author="Developer" --icon=assets/icon.png

      - name: Upload Wii U Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiU-WUHB-Build
          path: AmongUsWiiU.wuhb